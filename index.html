<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Shop 🍬</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0a0a;
            --surface: #1a1010;
            --card: #231515;
            --accent: #e8513a;
            --accent2: #f0a500;
            --text: #f5ede8;
            --muted: #a08070;
            --border: #3a2020;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: -1px;
        }

        .logo span { color: var(--accent2); }

        nav a {
            color: var(--muted);
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover { color: var(--text); }

        .btn-add {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-add:hover { background: #d44030; transform: translateY(-1px); }

        .hero {
            padding: 3rem 2rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 0.5rem;
        }

        .hero p { color: var(--muted); font-size: 1rem; }

        .controls {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.7rem 1rem;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box:focus { border-color: var(--accent); }
        .search-box::placeholder { color: var(--muted); }

        .filter-select {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.7rem 1rem;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
        }

        .grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem 3rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }

        .card:hover { transform: translateY(-4px); border-color: var(--accent); }

        .card-img {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #3a1a1a, #1a3a2a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
        }

        .card-body { padding: 1.2rem; }

        .card-category {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent2);
            margin-bottom: 0.4rem;
        }

        .card-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            color: var(--text);
        }

        .card-desc {
            font-size: 0.82rem;
            color: var(--muted);
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stock {
            font-size: 0.78rem;
            color: var(--muted);
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .btn-edit, .btn-delete {
            flex: 1;
            padding: 0.5rem;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }

        .btn-edit {
            background: var(--surface);
            color: var(--text);
            text-decoration: none;
            text-align: center;
            border: 1px solid var(--border);
        }

        .btn-edit:hover { background: var(--border); }

        .btn-delete {
            background: rgba(232, 81, 58, 0.15);
            color: var(--accent);
            border: 1px solid rgba(232, 81, 58, 0.3);
        }

        .btn-delete:hover { background: rgba(232, 81, 58, 0.3); }

        .loading, .empty {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--muted);
            font-size: 1rem;
            grid-column: 1 / -1;
        }

        .empty-icon { font-size: 3rem; margin-bottom: 1rem; }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: #4caf50; color: #4caf50; }
        .toast.error { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="logo">Sweet<span>Shop</span> 🍬</div>
    <nav>
        <a href="index.html">Produktet</a>
        <a href="add-sweet.html" class="btn-add">+ Shto Produkt</a>
    </nav>
</header>

<div class="hero">
    <h1>Dyqani i<br>Ëmbëlsirave 🍫</h1>
    <p>Menaxho koleksionin tënd të ëmbëlsirave</p>
</div>

<div class="controls">
    <input type="text" class="search-box" id="searchInput" placeholder="🔍 Kërko produkt...">
    <select class="filter-select" id="categoryFilter">
        <option value="">Të gjitha kategoritë</option>
    </select>
</div>

<div class="grid" id="sweetsGrid">
    <div class="loading">⏳ Duke ngarkuar produktet...</div>
</div>

<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
    const grid = document.getElementById('sweetsGrid');
    const searchInput = document.getElementById('searchInput');
    const categoryFilter = document.getElementById('categoryFilter');
    let allSweets = [];

    const categoryEmojis = {
        'Çokollatë': '🍫', 'Karamele': '🍬', 'Kek': '🎂',
        'Akullore': '🍦', 'Cookie': '🍪', 'Torte': '🎂',
        'Llollipop': '🍭', 'Çamçakëz': '🫧'
    };

    function getEmoji(category) {
        return categoryEmojis[category] || '🍬';
    }

    function showToast(msg, type = 'success') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast ${type} show`;
        setTimeout(() => t.className = 'toast', 3000);
    }

    function renderSweets(sweets) {
        if (!sweets.length) {
            grid.innerHTML = '<div class="empty"><div class="empty-icon">🍭</div><p>Nuk u gjetën produkte.</p></div>';
            return;
        }

        grid.innerHTML = sweets.map(s => `
            <div class="card">
                <div class="card-img">${getEmoji(s.category)}</div>
                <div class="card-body">
                    <div class="card-category">${s.category}</div>
                    <div class="card-name">${s.name}</div>
                    <div class="card-desc">${s.description}</div>
                    <div class="card-footer">
                        <span class="price">${s.price.toFixed(2)} €</span>
                        <span class="stock">📦 ${s.stock} copë</span>
                    </div>
                    <div class="card-actions">
                        <a href="edit-sweet.html?id=${s.id}" class="btn-edit">✏️ Edito</a>
                        <button class="btn-delete" onclick="deleteSweet(${s.id}, '${s.name}')">🗑 Fshi</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function populateCategories(sweets) {
        const cats = [...new Set(sweets.map(s => s.category))];
        cats.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c;
            opt.textContent = `${getEmoji(c)} ${c}`;
            categoryFilter.appendChild(opt);
        });
    }

    async function loadSweets() {
        try {
            allSweets = await SweetsAPI.getAll();
            renderSweets(allSweets);
            populateCategories(allSweets);
        } catch (err) {
            grid.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>Gabim: Kontrollo nëse API është duke punuar.<br><small>http://localhost:5000</small></p></div>';
        }
    }

    async function deleteSweet(id, name) {
        if (!confirm(`A je i sigurt që dëshiron të fshish "${name}"?`)) return;
        try {
            await SweetsAPI.delete(id);
            showToast(`✅ "${name}" u fshi me sukses!`);
            loadSweets();
        } catch (err) {
            showToast('❌ Gabim gjatë fshirjes!', 'error');
        }
    }

    // Search
    let searchTimer;
    searchInput.addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(async () => {
            const q = searchInput.value.trim();
            const cat = categoryFilter.value;
            let results = q ? await SweetsAPI.search(q) : allSweets;
            if (cat) results = results.filter(s => s.category === cat);
            renderSweets(results);
        }, 300);
    });

    // Filter by category
    categoryFilter.addEventListener('change', () => {
        const cat = categoryFilter.value;
        const q = searchInput.value.trim();
        let results = allSweets;
        if (q) results = results.filter(s =>
            s.name.includes(q) || s.description.includes(q) || s.category.includes(q));
        if (cat) results = results.filter(s => s.category === cat);
        renderSweets(results);
    });

    loadSweets();
</script>
</body>
</html>
