<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shto Produkt - Sweet Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0a0a; --surface: #1a1010; --card: #231515;
            --accent: #e8513a; --accent2: #f0a500; --text: #f5ede8;
            --muted: #a08070; --border: #3a2020;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

        header {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between;
        }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; color: var(--accent); }
        .logo span { color: var(--accent2); }
        .back-btn { color: var(--muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
        .back-btn:hover { color: var(--text); }

        .container { max-width: 600px; margin: 3rem auto; padding: 0 2rem; }

        h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 0.5rem; }
        .subtitle { color: var(--muted); margin-bottom: 2rem; }

        .form-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 2rem;
        }

        .form-group { margin-bottom: 1.4rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }

        input, select, textarea {
            width: 100%; background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 0.8rem 1rem; color: var(--text);
            font-size: 0.95rem; font-family: 'DM Sans', sans-serif;
            outline: none; transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); }
        input::placeholder, textarea::placeholder { color: var(--muted); }
        textarea { resize: vertical; min-height: 80px; }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        .btn-submit {
            width: 100%; background: var(--accent); color: white; border: none;
            padding: 1rem; border-radius: 12px; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: background 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }
        .btn-submit:hover { background: #d44030; transform: translateY(-1px); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .toast {
            position: fixed; bottom: 2rem; right: 2rem;
            background: var(--card); border: 1px solid var(--border);
            padding: 1rem 1.5rem; border-radius: 12px; font-size: 0.9rem;
            z-index: 1000; transform: translateY(100px); opacity: 0; transition: all 0.3s;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: #4caf50; color: #4caf50; }
        .toast.error { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>
<header>
    <div class="logo">Sweet<span>Shop</span> 🍬</div>
    <a href="index.html" class="back-btn">← Kthehu</a>
</header>

<div class="container">
    <h2>Shto Produkt të Ri</h2>
    <p class="subtitle">Plotëso të dhënat e produktit të ri</p>

    <div class="form-card">
        <div class="form-group">
            <label>Emri i Produktit *</label>
            <input type="text" id="name" placeholder="p.sh. Çokollatë Milka" required>
        </div>

        <div class="form-group">
            <label>Përshkrimi</label>
            <textarea id="description" placeholder="Përshkrim i shkurtër i produktit..."></textarea>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Kategoria *</label>
                <select id="category">
                    <option value="">Zgjidh kategorinë</option>
                    <option value="Çokollatë">🍫 Çokollatë</option>
                    <option value="Karamele">🍬 Karamele</option>
                    <option value="Kek">🎂 Kek</option>
                    <option value="Akullore">🍦 Akullore</option>
                    <option value="Cookie">🍪 Cookie</option>
                    <option value="Torte">🎂 Torte</option>
                    <option value="Llollipop">🍭 Llollipop</option>
                    <option value="Tjetër">✨ Tjetër</option>
                </select>
            </div>
            <div class="form-group">
                <label>Çmimi (€) *</label>
                <input type="number" id="price" placeholder="0.00" min="0" step="0.01" required>
            </div>
        </div>

        <div class="form-group">
            <label>Stoku (copë) *</label>
            <input type="number" id="stock" placeholder="100" min="0" required>
        </div>

        <button class="btn-submit" id="submitBtn" onclick="addSweet()">
            🍬 Shto Produktin
        </button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
    function showToast(msg, type = 'success') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast ${type} show`;
        setTimeout(() => t.className = 'toast', 3000);
    }

    async function addSweet() {
        const name = document.getElementById('name').value.trim();
        const description = document.getElementById('description').value.trim();
        const category = document.getElementById('category').value;
        const price = parseFloat(document.getElementById('price').value);
        const stock = parseInt(document.getElementById('stock').value);

        if (!name || !category || isNaN(price) || isNaN(stock)) {
            showToast('⚠️ Plotëso të gjitha fushat e detyrueshme!', 'error');
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = '⏳ Duke shtuar...';

        try {
            await SweetsAPI.create({ name, description, category, price, stock, imageUrl: '' });
            showToast('✅ Produkti u shtua me sukses!');
            setTimeout(() => window.location.href = 'index.html', 1500);
        } catch (err) {
            showToast('❌ Gabim gjatë shtimit!', 'error');
            btn.disabled = false;
            btn.textContent = '🍬 Shto Produktin';
        }
    }
</script>
</body>
</html>
